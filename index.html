<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Uriel XIT</title>

<style>
body{
    background:#0b0f1a;
    font-family: Arial;
    color:white;
}

#painel{
    width:320px;
    background:#111827;
    border:2px solid #00f0ff;
    border-radius:12px;
    padding:15px;
    box-shadow:0 0 20px #00f0ff;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

h2{
    text-align:center;
    color:#00f0ff;
}

.func{
    margin:8px 0;
}

.slider{
    width:100%;
}

.botao{
    background:#00f0ff;
    border:none;
    padding:6px;
    width:100%;
    border-radius:6px;
    margin-top:5px;
    color:black;
    font-weight:bold;
}

select{
    width:100%;
    padding:5px;
    border-radius:5px;
    background:#0b0f1a;
    color:white;
    border:1px solid #00f0ff;
}
</style>
</head>

<body>

<div id="painel">
<h2>Uriel XIT</h2>

<div class="func">
<input type="checkbox"> Aimbot
</div>

<div class="func">
<input type="checkbox"> ESP
</div>

<div class="func">
<input type="checkbox"> No Recoil
</div>

<div class="func">
<input type="checkbox"> Aim Lock
</div>

<div class="func">
Aim FOV
<input type="range" min="0" max="100" value="50" class="slider">
</div>

<div class="func">
<select>
<option>Cabeça</option>
<option>Peito</option>
<option>Pescoço</option>
</select>
</div>

<div class="func">
<input type="checkbox"> Apenas Visíveis
</div>

<div class="func">
<input type="checkbox"> Ignorar Derrubados
</div>

<div class="func">
<input type="checkbox"> Linha ESP
</div>

<div class="func">
<input type="checkbox"> Caixa ESP
</div>

<div class="func">
<input type="checkbox"> Mostrar Vida
</div>

<button class="botao">INICIAR</button>

</div>

</body>
</html>
